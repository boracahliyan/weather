<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id= "search_bar">
        <label for="text">Name of the city</label>
        <input id="city_name" type="text" placeholder="Berlin">
        <ul id="autocomplete"></ul>
        <button id="Enter_button">Enter</button>
    </div>

    <div class="weather-container">
        <!-- Input fields to take user city coordinates -->
        <h2>Current Weather</h2>
        <p>City:<span id="city">---</span></p>
        <p>Temperature: <span id="temperature">--</span>°C</p>
        <p>Rain: <span id="Weather_emo">--</span></p>
    </div>

    <div class="tables">
        <table class="table">
            
            <tr class="hourly_temp_head">
              
            </tr>

            <tr  class="hourly_temp">
            
            </tr>

        </table>

        <table class="table">
            
            <tr class="hourly_rain_head">
            </tr>

            <tr class="hourly_rain">
               
            </tr>

        </table>



    </div>

    
    <script type="module" src="app.js"></script>
</body>
</html>
